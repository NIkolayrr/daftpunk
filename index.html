      body {

      td {

        border-right: 0;

        text-align: center;
        font-size: 3em;
        color: white;
        cursor: pointer;
        position: relative;
        vertical-align: middle;
        transition: opacity 0.12s linear;
      }
      td[data-key]::after {
        content: attr(data-key);
        position: absolute;
        top: 10px;
        right: 14px;
        font-size: 0.5em;
        opacity: 0.75;
        letter-spacing: 0.08em;
      }
      td.key-active {
        opacity: 1 !important;

      }

      #btn_kanye,

      }

      svg {
        position: relative;
        top: 4px;
      }

      .topbar {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 2;
        color: white;
        font-size: 30px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
        text-align: right;
      }

      .topbar-meta {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }

      .topbar-separator {
        opacity: 0.7;

      #btn_kanye,

        font-family: 'VT323', monospace;
        white-space: nowrap;

      #btn_kanye {

        color: black;
      }

        background: #ff4d4d;
        color: white;
      }

      .credit-link {
        color: white;
        font-size: 30px;
        text-decoration: none;
        white-space: nowrap;
      }

      .soundboard {
        border-top: 55px black solid;
        border-right: 5px black solid;
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        width: 100%;
        height: 100%;

      @media (max-width: 900px) {
        .topbar {

        }

        td {

      @media (max-width: 640px) {

          text-align: center;
        }

        .topbar-meta {

        }

        }

        }

        td {
          font-size: 1.7em;
          border-width: 6px;
        }

        td[data-key]::after {
          top: 6px;
          right: 8px;
          font-size: 0.42em;

      <tr>
        <td data-slug="More than" data-key="A" style="background: #004d4d" onclick="play(this)">More than</td>
        <td data-slug="Hour" data-key="S" style="background: #004d4d" onclick="play(this)">Hour</td>

      <tr>

      ]

      var text = []
      var count = 0
      var screen_width = $(document).width()
      var keyMap = {}
      var kanye_timer = null
      var kanye_sequence = [
        // Hook + second phrase repeated 4 times
        'Work it',
        'Harder',

        'Our',
        'Work is',
        'Never',
        'Over',
      ]
      var kanye_delays = [
        // Hook
        520, 500, 520, 500, 520, 500, 560, 720,
        // More than ever...
        500, 480, 500, 480, 520, 500, 520, 800,

        520, 500, 520, 500, 520, 500, 560, 720, 500, 480, 500, 480, 520, 500, 520, 800,

        520, 500, 520, 500, 520, 500, 560, 720, 500, 480, 500, 480, 520, 500, 520, 800,

        520, 500, 520, 500, 520, 500, 560, 720, 500, 480, 500, 480, 520, 500, 520, 800,
      ]

      if (document.location.href.indexOf('test') > -1) {
        $('#timeline').show()
      }

      $('td').each(function () {
        var slug = $(this).html().trim().replace(/ /g, '_')
        var key = ($(this).data('key') || '').toString().toUpperCase()

        var html = '<audio id="loop' + slug + '" ><source src="static/' + slug + '.mp3" type="audio/mp3"></audio>'
        $('#sounds').append(html)

        if (key) {
          keyMap[key] = this
        }
      })

      function play(obj) {
        var slug = $(obj).html().trim().replace(/ /g, '_')

        $(obj).addClass('key-active')

        $('#loop' + slug)[0].currentTime = 0
        $('#loop' + slug)[0].play()

        if (!time) {
          enlight(obj)
        }

        setTimeout(function () {
          $(obj).removeClass('key-active')
        }, 180)
      }

      function playByKey(key) {
        var mapped = keyMap[(key || '').toString().toUpperCase()]

        if (mapped) {
          $(mapped).addClass('key-active')
          play(mapped)
        }
      }

      function playSequence(items, delays) {
        clearTimeout(kanye_timer)

        var index = 0

        function runNext() {
          if (index >= items.length) {
            kanye_timer = null
            return
          }

          var slug = items[index]
          var cell = $('td[data-slug="' + slug + '"]')[0]

          if (cell) {
            play(cell)
          }

          var nextDelay = Array.isArray(delays) ? delays[index] || 500 : 500
          index++
          kanye_timer = setTimeout(runNext, nextDelay)
        }

        runNext()
      }

      function stopSequence() {
        clearTimeout(kanye_timer)
        kanye_timer = null
      }

      function enlight(obj) {
        $(obj).css('opacity', 1).animate(
          {
            opacity: '0.4',
          },
          1400,
        )
      }

      function playGeneral(obj) {
        if (time) {
          clearInterval(timer_music)
          clearInterval(timer_countdown)
          time = 0
          count = 0
          $('#music')[0].pause()
        } else {
          $('#music')[0].play()
          $('#music')[0].currentTime = 0

          clearInterval(timer_countdown)
          time_countdown = 3
          timer_countdown = setInterval(function () {
            time_countdown--

            if (time_countdown == 0) {
              clearInterval(timer_countdown)
            }
          }, 900)

          timer_music = setInterval(function () {
            time++

            $('#timeline').html(time)

            if (times.includes(time + 4)) {
              if (texts[count]) {
                enlight('td[data-slug="' + texts[count] + '"]')
              }
              count++
            }

            if (time == 460) {
              playGeneral(obj)
            }
          }, 250)
        }
      }

      $(document).on('keydown', function (e) {
        var key = (e.key || '').toUpperCase()

        if (!key) {
          return
        }

        if (e.repeat) {
          return
        }

        if (key === ' ') {
          e.preventDefault()
          playGeneral(document.body)
          return
        }

        if (keyMap[key]) {
          e.preventDefault()
          playByKey(key)
        }
      })
      $(document).on('keyup', function (e) {
        var key = (e.key || '').toUpperCase()

        if (keyMap[key]) {
          $(keyMap[key]).removeClass('key-active')
        }
      })

      $('#btn_kanye').on('click', function () {
        playSequence(kanye_sequence, kanye_delays)
      })

      $('#btn_stop_sequence').on('click', function () {
        stopSequence()
      })

      function share() {
        if (screen_width < 800) {
          const shareData = {
            title: document.title,
            text: document.title,
            url: document.location.href,
          }

          navigator.share(shareData)
        } else {
          window.open(
            'https://twitter.com/intent/tweet?text=' +
              encodeURIComponent(document.title) +
              '&tw_p=tweetbutton&url=' +
              document.location.href,
          )
        }
      }
